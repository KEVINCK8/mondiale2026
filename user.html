<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondiale 2026 - Pronostici Utente</title>
    <link rel="icon" href="icona.ico?v=1.6.0" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css?v=1.6.0">
</head>
<body class="bg-slate-900 text-white font-['Poppins'] min-h-screen">
    <!-- Navbar -->
    <nav class="bg-slate-800/50 backdrop-blur-md sticky top-0 z-50 border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="text-2xl font-black bg-gradient-to-r from-emerald-400 via-cyan-400 to-purple-400 bg-clip-text text-transparent tracking-tighter">MONDIALE 2026</a>
                </div>
                <div class="flex space-x-4">
                    <a href="index.html" class="text-slate-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Classifica</a>
                    <a href="results.html" class="text-slate-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Risultati</a>
                    <a href="rules.html" class="text-slate-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Regole</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- User Header -->
    <header class="py-12 px-4 relative overflow-hidden">
        <div class="max-w-4xl mx-auto text-center animate__animated animate__fadeIn">
            <h1 id="user-name" class="text-4xl md:text-6xl font-bold mb-2 uppercase tracking-tighter">Caricamento...</h1>
            <div id="user-stats" class="flex flex-wrap justify-center gap-6 md:gap-12 mt-8">
                <div class="text-center px-4">
                    <p class="text-slate-400 text-[10px] md:text-xs uppercase tracking-[0.2em] mb-2">Punti Totali</p>
                    <p id="total-points" class="text-4xl md:text-6xl font-black bg-gradient-to-r from-emerald-400 via-cyan-400 to-purple-400 bg-clip-text text-transparent drop-shadow-sm">0</p>
                </div>
                <div class="w-px h-12 bg-slate-800 self-center hidden md:block"></div>
                <div class="text-center px-4">
                    <p class="text-slate-400 text-[10px] md:text-xs uppercase tracking-[0.2em] mb-2 flex items-center justify-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span> 3 Punti
                    </p>
                    <p id="exact-scores" class="text-3xl md:text-5xl font-bold text-white">0</p>
                </div>
                <div class="w-px h-12 bg-slate-800 self-center hidden md:block"></div>
                <div class="text-center px-4">
                    <p class="text-slate-400 text-[10px] md:text-xs uppercase tracking-[0.2em] mb-2 flex items-center justify-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-cyan-500"></span> 1 Punto
                    </p>
                    <p id="correct-outcomes" class="text-3xl md:text-5xl font-bold text-white">0</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Groups Grid -->
    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div id="groups-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Group cards will be injected here -->
        </div>
    </main>

    <script src="script.js?v=1.6.0"></script>
    <script>
        // Specific logic for user page to load user data
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const userName = urlParams.get('name');
            if (userName) {
                loadUserData(userName);
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
