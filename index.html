<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mondiale 2026 - Classifica</title>
    <link rel="icon" href="icona.ico?v=1.4.2" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css?v=1.4.2">
</head>
<body class="bg-slate-900 text-white font-['Poppins'] min-h-screen">
    <!-- Navbar -->
    <nav class="bg-slate-800/50 backdrop-blur-md sticky top-0 z-50 border-b border-slate-700">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-black bg-gradient-to-r from-emerald-400 via-cyan-400 to-purple-400 bg-clip-text text-transparent tracking-tighter">MONDIALE 2026</span>
                </div>
                <div class="flex space-x-4">
                    <a href="index.html" class="text-emerald-400 px-3 py-2 rounded-md text-sm font-medium border-b-2 border-emerald-400">Classifica</a>
                    <a href="results.html" class="text-slate-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Risultati</a>
                    <a href="rules.html" class="text-slate-300 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Regole</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header Section -->
    <header class="py-12 px-4 relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-emerald-500/10 via-transparent to-transparent -z-10"></div>
        <div class="max-w-4xl mx-auto text-center animate__animated animate__fadeIn">
            <h1 class="text-4xl md:text-6xl font-bold mb-8">Classifica Generale</h1>
            
            <!-- Photo Section -->
            <div class="w-11/12 max-w-[300px] md:max-w-xl lg:max-w-2xl mx-auto mb-8">
                <div class="relative rounded-3xl overflow-hidden shadow-2xl border border-slate-700 bg-black aspect-video">
                    <img 
                        src="foto.jpeg?v=1.4.2" 
                        alt="Foto Mondiale 2026" 
                        class="w-full h-full object-cover"
                    >
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent pointer-events-none"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 pb-20">
        <div class="bg-slate-800/30 backdrop-blur-xl border border-slate-700 rounded-3xl overflow-hidden shadow-2xl animate__animated animate__fadeInUp">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-800/50 border-b border-slate-700">
                        <tr>
                            <th class="px-4 py-4 text-xs md:text-sm font-semibold text-slate-400 uppercase tracking-wider">Pos</th>
                            <th class="px-4 py-4 text-xs md:text-sm font-semibold text-slate-400 uppercase tracking-wider">Partecipante</th>
                            <th class="px-4 py-4 text-xs md:text-sm font-semibold text-emerald-400 uppercase tracking-wider text-right">Totale</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-slate-700">
                        <!-- Loading State -->
                        <tr>
                            <td colspan="3" class="px-6 py-10 text-center text-slate-500 italic">
                                <i class="fas fa-circle-notch fa-spin mr-2"></i> Caricamento classifica...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-slate-500 text-sm">
        <p>&copy; 2026 Mondiale Ck8 Lab <i class="fas fa-heart text-red-500"></i></p>
    </footer>

    <script src="script.js?v=1.4.2"></script>
</body>
</html>
